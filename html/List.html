<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Species List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    .table-container {
      background-color: #e0f9f5;
      border-radius: 12px;
      padding: 1.5rem;
    }

    .table-header {
      font-weight: 600;
    }
    
    .table-row {
      background-color: white;
      border-radius: 20px;
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
    }
    table thead th {
      background-color: #d7f7f3 !important;
      border: none;
    }

    table {
      border-collapse: separate;
      border-spacing: 0 1rem;
    }
    table tbody tr {
      background-color: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 0 0px #ddd; 
    }
    body {
      background-color: #ffffff;
      font-family: 'Arial', sans-serif;
    }

    .list-container {
      background-color: #d7f7f3;
      padding: 0.75rem 1.5rem;
      border-radius: 20px;
      overflow: hidden;
    }
    .animal-title {
      font-size: 4rem; 
      font-weight: 800;
    }
    .table td, .table th {
      vertical-align: middle;
    }
    thead th {
      background-color: #d7f7f3;
      border: none;
      padding: 1rem;
      font-weight: 600;
      font-size: 20px;
    }
    table tbody td:first-child {
      border-top-left-radius: 12px;
      border-bottom-left-radius: 12px;
    }
    table tbody td:last-child {
      border-top-right-radius: 12px;
      border-bottom-right-radius: 12px;
    }
    .profile-img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 50%;
    }
    
    .btn-icon {
      border: none;
      background: none;
      color: #2c2c2c;
    }

    .btn-icon:hover {
      color: #000;
    }
    .add-new-btn {
      background-color: #d7f7f3;
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      font-weight: 600;
    }
    .black-link {
    color: black;
    text-decoration: none;
  }
  </style>
</head>
<body class="p-4">

<div class="container mt-5">
  <h1 class="animal-title">List</h1>
  <div class="d-flex justify-content-between align-items-center mt-3 mb-4">
    <h4 class="fw-semibold">Species</h4>
    <button class="add-new-btn">Add New</button>
  </div>

  <div class="list-container">
    <table class="table align-middle">
      <thead class="fw-semibold">
        <tr>
          <th>Photo</th>
          <th>Species Name</th>
          <th>Animal ID</th>
          <th>Total</th>
          <th>Edit</th>
        </tr>
      </thead>
      <tbody>
          <tr>
            <td><img src="Images/Lala.jpg" alt="Harimau" class="profile-img" /></td>
            <td><a href="animalProfile.html?species_id=1" class="black-link"><strong>Harimau Sumatera</strong></a></td>
            <td>A001 - A005</td>
            <td>5</td>
            <td>
              <button class="btn-icon me-2"><i class="fas fa-pen"></i></button>
              <button class="btn-icon"><i class="fas fa-trash"></i></button>
            </td>
          </tr>
          <tr>
            <td><img src="Images/OrangUtan.jpg" alt="Orang Utan" class="profile-img" /></td>
            <td><a href="animalProfile.html?species_id=2" class="black-link"><strong>Orang Utan</strong></a></td>
            <td>B001 - B003</td>
            <td>2</td>
            <td>
              <button class="btn-icon me-2"><i class="fas fa-pen"></i></button>
              <button class="btn-icon"><i class="fas fa-trash"></i></button>
            </td>
          </tr>
          <tr>
            <td><img src="Images/LandakSumatera.jpg" alt="Landak" class="profile-img" /></td>
            <td><a href="animalProfile.html?species_id=3" class="black-link"><strong>Landak</strong></a></td>
            <td>C001 - C003</td>
            <td>3</td>
            <td>
              <button class="btn-icon me-2"><i class="fas fa-pen"></i></button>
              <button class="btn-icon"><i class="fas fa-trash"></i></button>
            </td>
          </tr>
          <tr>
            <td><img src="Images/Bekantan.jpg" alt="Bekantan" class="profile-img" /></td>
            <td><a href="animalProfile.html?species_id=4" class="black-link"><strong>Bekantan</strong></a></td>
            <td>D001 - D004</td>
            <td>4</td>
            <td>
              <button class="btn-icon me-2"><i class="fas fa-pen"></i></button>
              <button class="btn-icon"><i class="fas fa-trash"></i></button>
            </td>
          </tr>
          <tr>
            <td><img src="Images/Anoa.PNG" alt="Anoa" class="profile-img" /></td>
            <td><a href="animalProfile.html?species_id=5" class="black-link"><strong>Anoa</strong></a></td>
            <td>E001 - E003</td>
            <td>2</td>
            <td>
              <button class="btn-icon me-2"><i class="fas fa-pen"></i></button>
              <button class="btn-icon"><i class="fas fa-trash"></i></button>
            </td>
          </tr>
          <tr>
            <td><img src="Images/Badak.jpg" alt="Badak Jawa" class="profile-img" /></td>
            <td><a href="animalProfile.html?species_id=6" class="black-link"><strong>Badak Jawa</strong></a></td>
            <td>F001 - F003</td>
            <td>1</td>
            <td>
              <button class="btn-icon me-2"><i class="fas fa-pen"></i></button>
              <button class="btn-icon"><i class="fas fa-trash"></i></button>
            </td>
          </tr>
          <tr>
            <td><img src="Images/Gajah.jpg" alt="Gajah Sumatera" class="profile-img" /></td>
            <td><a href="animalProfile.html?species_id=7" class="black-link"><strong>Gajah Sumatera</strong></a></td>
            <td>G001 - G003</td>
            <td>1</td>
            <td>
              <button class="btn-icon me-2"><i class="fas fa-pen"></i></button>
              <button class="btn-icon"><i class="fas fa-trash"></i></button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Bootstrap JS and jQuery -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>


</body>
</html>
