<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #fff;
      font-family: Arial, sans-serif;
      padding: 10px 50px 50px 50px;
      width: 100%;
      position: relative;
      padding-top: 30px;
      min-height: 100vh;
    }

    .logo-fixed {
      position: absolute;
      right: 60px;
      top: 30px;
      text-align: right;
      z-index: 10;
      margin-bottom: 20px;
    }

    .logo-text {
      font-size: 110px;
      font-weight: bold;
      color: #00C7A0;
      line-height: 0.9;
    }

    .logo-text span {
      display: block;
    }

    .sub-logo {
      font-size: 20px;
      font-weight: 500;
      color: #000000;
    }

    .profile-container {
      display: flex;
      gap: 40px;
      margin-top: 0;
      align-items: flex-start;
    }

    .form-box {
      background-color: #B0F8E9;
      padding: 40px;
      border-radius: 20px;
      width: 500px;
    }

    .profile-img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid white;
    }

    .welcome-text {
      font-size: 50px;
      font-weight: bold;
      line-height: 1;
    }

    .form-label {
      margin-top: 15px;
      font-weight: 600;
    }

    .form-control,
    .form-select {
      border: none;
      border-radius: 6px;
      background-color: white;
    }

    .form-control:focus,
    .form-select:focus {
      box-shadow: none;
      border: 1px solid #ccc;
    }

    .top-section {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .right-gallery {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 20px;
    }

    .right-gallery img {
      border-radius: 16px;
      object-fit: cover;
    }

    .img-large {
      width: 560px;
      height: 280px;
    }

    .img-small-horizontal {
      display: flex;
      gap: 10px;
    }

    .img-small-horizontal img {
      width: 280px;
      height: 360px;
    }

    .logout-btn {
      background-color: #ccf5f0;
      color: black;
      font-weight: 500;
      border: none;
      padding: 10px 25px;
      border-radius: 8px;
    }

    .logout-container {
      position: absolute;
      bottom: 20px;
      left: 50px;
    }
  </style>
</head>
<body>

  <!-- Logo Atas Kanan -->
  <div class="logo-fixed">
    <div class="logo-text">
      <span>WCT</span>
      <span>LIFE</span>
      <span class="sub-logo">Eyes on Wildlife</span>
    </div>
  </div>

  <div class="profile-container">
    <!-- Kiri: Form Profil -->
    <div class="form-box">
      <div class="top-section">
        <div class="text-center">
          <img id="photo_url" src=" " alt="User Photo" width="100" height="100" />
        </div>
        <div>
          <div class="welcome-text" id="username">Welcome!</div>
        </div>
      </div>

      <form>
        <label class="form-label">Full Name</label>
        <input type="text" id="full_name" class="form-control" readonly />

        <label class="form-label">Email</label>
        <div class="d-flex align-items-center">
          <input type="text" id="email" class="form-control" readonly />
        </div>

        <label class="form-label">Role</label>
        <input type="text" id="role" class="form-control" readonly />

        <label class="form-label">Phone Number</label>
        <input type="text" id="phone_number" class="form-control" readonly />

        <label class="form-label">Status User</label>
        <input type="text" id="status_user" class="form-control" readonly />
      </form>
    </div>

    <!-- Kanan: Gambar Hewan -->
    <div class="right-gallery">
      <img src="Images/employee2.jpeg" alt="Employee 2" class="img-large" />
      <div class="img-small-horizontal">
        <img src="Images/employee4.jpeg" alt="Employee 4" />
        <img src="Images/employee1.jpeg" alt="Employee 1" />
        <img src="Images/employee3.jpeg" alt="Employee 3" />
      </div>
    </div>
  </div>

  <!-- Logout Button Kiri Bawah -->
  <div class="logout-container">
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script>
    $(document).ready(function () {
      var data = JSON.parse(localStorage.getItem("User"));
      $("#full_name").val(data.full_name);
      $("#email").val(data.email);
      $("#role").val(data.role);
      $("#phone_number").val(data.phone_number);
      $("#status_user").val(data.status_user);
      $("#photo_url").attr("src", data.photo_url);
    });

    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
