<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Animal Observation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      height: 100%;
      font-family: 'SF Pro Displays', sans-serif;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .left-rectangle {
      width: 30%;
      background: linear-gradient(135deg, #71F3FF, #1FDAAE);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      color: white;
    }

    .left-content {
      margin-top: 40px;
      text-align: center;
    }

    .left-rectangle h1 {
      font-size: 80px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 8px;
    }

    .left-rectangle h2 {
      font-size: 18px;
      font-weight: 600;
    }

    .right-content {
      width: 70%;
      background-color: #ffffff;
      padding: 50px 80px;
      overflow-y: auto;
    
    }

    .right-content h1 {
      font-size: 45px;
      font-weight: 700;
      color: #333;
      margin-top: 90px;
      font-family: 'Poppins', sans-serif;
    }

    .form-label {
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      font-weight: 450;
      margin-bottom: 10px;
      display: block;
    }

    .custom-input,
    .form-select {
      width: 100%;
      padding: 10px 18px;
      font-size: 14px;
      border-radius: 5px;
      border: 1px solid #63EFF0;
      font-family: 'Poppins', sans-serif;
      margin-top: 10px;
    }

    .form-group {
      margin-bottom: 10px;
      
    }

    .row-gap {
      display: flex;
      gap: 20px;
    }

    .save-button-container {
      display: flex;
      justify-content: flex-end;
      margin-top: 30px;
    }

    .save-btn {
      background-color: #1FDAAE;
      color: white;
      border: none;
      padding: 10px 30px;
      border-radius: 6px;
      font-size: 16px;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .save-btn:hover {
      background-color: #1bc199;
    }

    textarea {
      resize: vertical;
    }
    .right-content-title {
  font-size: 45px;
  font-weight: 700;
  color: #333;
  font-family: 'SF Pro Displays', sans-serif;
  margin-bottom: 30px;
}

  </style>
</head>
<body>
  <div class="container-fluid h-100">
    <div class="row h-100">
      <!-- KIRI -->
     <div class="left-rectangle">
      <div class="left-content">
        <h1><span class="bold-text">WCT</span><br><span class="bold-text">PAWL</span></h1>
        <h2>Eyes on Wildlife</h2>
      </div>
    </div>

      <!-- KANAN -->
      <div class="col-md-8 p-5">
        <h1 class="right-content-title mb-4">Add Animal Detail,</h1>
        <form>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Daily Activity</label>
              <textarea class="form-control custom-input" rows="3"></textarea>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Mating Season</label>
              <div class="d-flex gap-2">
                <select class="form-select custom-input">
                  <option>January</option>
                  <option>February</option>
                  <!-- ... -->
                </select>
                <select class="form-select custom-input">
                  <option>January</option>
                  <option>February</option>
                  <!-- ... -->
                </select>
              </div>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Eating Pattern</label>
              <input type="text" class="form-control custom-input">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Last Observed (DD/MM/YYYY)</label>
              <div class="d-flex gap-2">
                <input type="text" class="form-control custom-input" placeholder="DD">
                <input type="text" class="form-control custom-input" placeholder="MM">
                <input type="text" class="form-control custom-input" placeholder="YYYY">
              </div>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Details</label>
              <input type="text" class="form-control custom-input" value="// Hide">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Zone - Location</label>
              <div class="d-flex gap-2">
                <select class="form-select custom-input w-25">
                  <option>1</option>
                  <option>2</option>
                </select>
                <input type="text" class="form-control custom-input w-75" placeholder="Location">
              </div>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Social Trait</label>
              <textarea class="form-control custom-input" rows="3"></textarea>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Condition</label>
              <select class="form-select custom-input">
                <option>Healthy</option>
                <option>Injured</option>
                <option>Sick</option>
              </select>
            </div>

            <div class="col-md-12 mb-4">
              <label class="form-label">Notes</label>
              <textarea class="form-control custom-input" rows="2"></textarea>
            </div>
          </div>

          <div class="d-flex justify-content-end">
            <button type="submit" class="save-btn">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
  </script>
</body>
</html>
