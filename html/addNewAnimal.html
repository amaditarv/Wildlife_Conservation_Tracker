<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Add New Animal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&family=SF+Pro+Display:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body, html {
      height: 100%;
      font-family: 'SF Pro Display', sans-serif;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    .left-rectangle {
      width: 30%;
      background: linear-gradient(135deg, #71F3FF, #1FDAAE);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      color: white;
    }

    .left-content {
      margin-top: 40px;
      text-align: center;
    }

    .left-rectangle h1 {
      font-size: 80px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 8px;
    }

    .left-rectangle h2 {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
    }

    .middle-panel, .right-panel {
      width: 35%;
      background-color: #ffffff;
      padding: 50px;
      display: flex;
      flex-direction: column;
    }

    .middle-panel h1 {
      font-size: 45px;
      font-weight: 700;
      color: #333;
      margin-top: 15px;
    }

    .form-group {
      margin-top: 40px;
    }

    .custom-label {
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 10px;
      display: block;
    }

    input[type="text"],
    input[type="number"],
    input[type="date"],
    select {
      width: 80%;
      padding: 10px 15px;
      font-size: 14px;
      border-radius: 5px;
      border: 1px solid #63EFF0;
      font-family: 'Poppins', sans-serif;
    }

    select:focus,
    input:focus {
      border-color: #1FDAAE;
      box-shadow: 0 0 5px #1FDAAE;
      outline: none;
    }

    .radio-group {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    input[type="radio"] {
      transform: scale(1.3);
      accent-color: #1FDAAE;
    }

    .radio-group label {
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .upload-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      margin-top: 80px;
    }

    .upload-wrapper i {
      font-size: 22px;
      color: #000;
    }

    .upload-wrapper span {
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      color: #000;
    }

    .save-button {
      position: fixed;
      bottom: 70px;
      right: 80px;
      background-color: #1FDAAE;
      color: white;
      border: none;
      padding: 10px 30px;
      border-radius: 6px;
      font-size: 16px;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.3s ease;
      z-index: 1000;
    }

    .save-button:hover {
      background-color: #1bc199;
    }
  </style>
</head>

<body>
  <form method="POST" action="addAnimal" enctype="multipart/form-data">
    <div class="container">

      <!-- LEFT -->
      <div class="left-rectangle">
        <div class="left-content">
          <h1><span class="bold-text">WCT</span><br><span class="bold-text">PAWL</span></h1>
          <h2>Eyes on Wildlife</h2>
        </div>
      </div>

      <!-- MIDDLE -->
      <div class="middle-panel">
        <h1>Add New Animal,</h1>

        <div class="form-group">
          <label for="name" class="custom-label">Name</label>
          <input type="text" id="name" name="name" required />
        </div>

        <div class="form-group">
          <label for="species" class="custom-label">Species Name</label>
          <select id="species" name="species_id" required>
            <option value="" disabled selected>Pilih spesies</option>
            <option value="1">Harimau Sumatera</option>
            <option value="2">Orang Utan</option>
            <option value="3">Landak</option>
            <option value="4">Bekantan</option>
            <option value="5">Anoa</option>
            <option value="6">Badak Jawa</option>
            <option value="7">Gajah Sumatera</option>
          </select>
        </div>

        <div class="form-group">
          <label class="custom-label">Gender</label>
          <div class="radio-group">
            <label><input type="radio" name="gender" value="Male" required /> Male</label>
            <label><input type="radio" name="gender" value="Female" required /> Female</label>
          </div>
        </div>

        <div class="form-group">
          <label for="weight" class="custom-label">Weight (kg)</label>
          <input type="number" id="weight" name="weight" min="0" step="0.1" required />
        </div>
      </div>

      <!-- RIGHT -->
      <div class="right-panel">

        <div class="form-group">
          <label for="upload-photo" class="upload-wrapper">
            <i class="bi bi-camera-fill"></i>
            <span>Upload Photo</span>
          </label>
          <input type="file" id="upload-photo" name="photo_url" accept="image/*" style="display: none;" />
        </div>

        <div class="form-group">
          <label for="health" class="custom-label">Health Status</label>
          <select id="health" name="status" required>
            <option value="" disabled selected>Select health status</option>
            <option value="Healthy">Healthy</option>
            <option value="Unwell">Unwell</option>
            <option value="Emergency">Emergency</option>
            <option value="Dead">Dead</option>
          </select>
        </div>

        <div class="form-group">
          <label for="dob" class="custom-label">Date of Birth</label>
          <input type="date" id="dob" name="dob" required />
        </div>

      </div>
    </div>

    <!-- BUTTON -->
    <button type="submit" class="save-button">Save</button>
  </form>

  <!-- SweetAlert untuk notifikasi -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
 <script>
  document.querySelector('form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    
    try {
        const response = await fetch('/WCT/addAnimal', {
            method: 'POST',
            body: formData
        });
        
        // Check if response is OK (status 200-299)
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const result = await response.json();
        
        if (result.status === 'success') {
            Swal.fire({
                icon: 'success',
                title: 'Berhasil!',
                text: result.message
            }).then(() => {
                this.reset();
            });
        } else {
            Swal.fire({
                icon: 'error',
                title: 'Gagal!',
                text: result.message || 'Unknown error occurred'
            });
        }
    } catch (error) {
        console.error('Error details:', error);
        Swal.fire({
            icon: 'error',
            title: 'Error!',
            text: error.message || 'Terjadi kesalahan saat mengirim data'
        });
    }
});
</script>
</body>
</html>
