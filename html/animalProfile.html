<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animal Profile Carousel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #ffffff;
    }

    .carousel-control-prev,
    .carousel-control-next {
      top: 50%;
      transform: translateY(-50%);
      width: 60px;
      height: 60px;
      background-color: rgba(0, 0, 0, 0.9);
      border-radius: 50%;
      border: none;
      opacity: 1;
    }

    .carousel-control-prev-icon,
    .carousel-control-next-icon {
      background-size: 60% 60%;
    }

    .carousel-control-prev:hover,
    .carousel-control-next:hover {
      background-color: rgba(0, 0, 0, 1);
    }

    .card-custom {
      background-color: #c6fff5;
      border: none;
      border-radius: 30px;
      padding: 20px 10px;
      text-align: center;
      width: 300px;
      flex: 0 0 auto;
    }

    .animal-title {
      font-size: 4rem;
      font-weight: 800;
    }

    .profile-img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 15px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .status-badge {
      font-weight: bold;
      margin-bottom: 12px;
    }

    .subtitle {
      font-style: italic;
      font-weight: 300;
      margin-top: -1rem;
    }

    .animal-info {
      text-align: left;
      font-size: 16px;
      margin: 16px auto;
      max-width: 200px;
    }

    .animal-info p {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
    }

    .btn-outline-dark {
      border-radius: 12px;
    }

    @media (max-width: 768px) {
      .card-custom {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
    <div class="text-center w-100">
      <h1 class="animal-title">Animal Profile</h1>
      <h5 class="subtitle">Harimau Sumatera</h5>
    </div>
  </div>

  <div id="cardCarousel" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner" id="carousel-content">
      <!-- Slides will be injected here -->
    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#cardCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#cardCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  function getStatusBadge(status) {
    let statusClass = "text-secondary";
    if (status === "Healthy") statusClass = "text-success";
    else if (status === "UNWELL") statusClass = "text-warning";
    else if (status === "EMERGENCY") statusClass = "text-danger";
    return `<p class="status-badge ${statusClass}">${status}</p>`;
  }

  const urlParams = new URLSearchParams(window.location.search);
  const speciesId = urlParams.get("species_id");

  if (speciesId) {
    fetch("http://localhost:8080/WCT/species", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ id: speciesId })
    })
    .then(response => response.json())
    .then(data => {
      if (data.status === "success") {
        document.querySelector(".subtitle").textContent = data.name;

        const carouselContent = document.getElementById("carousel-content");
        const animals = data.animals || [];
        const cardsPerSlide = 3;

        for (let i = 0; i < animals.length; i += cardsPerSlide) {
          const slideAnimals = animals.slice(i, i + cardsPerSlide);
          const isActive = i === 0 ? "active" : "";
          const slideHTML = `
            <div class="carousel-item ${isActive}">
              <div class="d-flex justify-content-center flex-wrap gap-4">
                ${slideAnimals.map(animal => `
                  <div class="card-custom card">
                    <img src="${animal.photo_url}" class="profile-img" alt="${animal.name}">
                    <h5>${animal.name}</h5>
                    <div class="animal-info">
                      <p><span>Umur:</span><span>${animal.estimated_age} Tahun</span></p>
                      <p><span>Gender:</span><span>${animal.gender}</span></p>
                      <p><span>Berat:</span><span>${animal.weight} kg</span></p>
                    </div>
                    ${getStatusBadge(animal.status)}
                    <a href="detail.html?animal_id=${animal.animal_id}" class="btn btn-outline-dark">view details</a>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
          carouselContent.innerHTML += slideHTML;
        }
      } else {
        console.error(data.message);
      }
    });
  } else {
    console.error("species_id not found in URL");
  }
</script>
</body>
</html>
