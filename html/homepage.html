<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wildlife Conversation Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #fff;
      margin: 0;
      padding: 0;
      position: relative;
      height: 100vh;       /* tinggi layar penuh */
      width: 100vw;        /* lebar layar penuh */
      overflow: hidden; 
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px 10px 40px;
    }
    .search-input {
      width: 100%;
      max-width: 1500px;
      border: 1px solid #28c5b4;
      border-radius: 10px;
      padding: 8px 15px;
      font-size: 1rem;
    }
    .profile-photo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      cursor: pointer;
      margin-left: 20px;
    }
    .list-menu {
      margin-top: 10px;
      margin-bottom: 20px;
    }
    .list-menu a {
      font-size: 0.85rem;
      text-decoration: none;
      color: #000;
    }
    .title-date-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 0 40px;
      margin-top: 10px;
    }
    .title-section {
      max-width: 70%;
    }
    .title {
      font-size: 4rem;
      font-weight: bold;
      line-height: 0.9;
      margin-bottom: 20px;
    }
    .desc {
      margin-top: 20px;
      font-size: 1.2rem;
      color: #444;
    }
    .date-block {
      text-align: right;
      font-size: 40px;
      line-height: 1.1;
      width: 90px;
      flex-shrink: 0;
      margin-top: -40px;
    }
    .main-section {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 0 40px;
      margin-top: 20px;
    }
    .left-panel {
      width: 50%;
    }
    .population-count {
      font-size: 5rem;
      color: #28c5b4;
      margin-top: 10px;
    }
    .population-text {
      color: #28c5b4;
      font-style: italic;
      font-size: 1.5rem;
      margin-top: -20px;
    }
    .attention-section {
      margin-top: 40px;
    }
    .attention-title {
      font-weight: bold;
      margin-bottom: 10px;
    }
    .animal-box {
      background-color: #ccf5f0;
      border-radius: 16px;
      padding: 10px;
      width: 90px;
      text-align: center;
      margin-right: 10px;
    }
    .animal-box img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
    }
    .animal-box span {
      display: block;
      margin-top: 5px;
      font-weight: bold;
    }

    /* Tambahan untuk gambar quokka di kanan bawah */
    .quokka-fixed {
      position: absolute;
      bottom: 0px;
      right: -60px;
      width: 600px;
      height: auto;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <input type="text" class="search-input" placeholder="Search" />
    <a href="User.html">
    <img id="photo_url" class="profile-photo" alt="Profile" src = "Images/default.jpg" />
    </a>
  </div>

  <div class="list-menu px-5">
    <a href="List.html" class="text-decoration-none text-dark small">List</a>
    <a href="addnewanimal.html" class="text-decoration-none text-dark small">New Animal</a>
    <a href="addanimaldetail.html" class="text-decoration-none text-dark small">Animal Detail</a>
  </div>

  <div class="title-date-row">
    <div class="title-section">
      <div class="title">Wildlife<br>Conversation<br>Tracker</div>
      <p class="desc">
        Welcome, WCT Pawl!<br />
        Easily record and monitor wildlife activity.<br />
        Access data, report findings, and support conservation efforts in the field.
      </p>
    </div>
    <div class="date-block">
      1<br /><strong>MAY</strong><br />2025
    </div>
  </div>

  <div class="main-section">
    <div class="left-panel">
      <div class="population-count">25</div>
      <div class="population-text">Population</div>

      <div class="attention-section">
        <div class="attention-title">NEED ATTENTION !</div>
        <div class="d-flex">
          <div class="animal-box">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/56/Tiger.50.jpg" alt="Tiger" />
            <span>LECI</span>
          </div>
          <div class="animal-box">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/56/Tiger.50.jpg" alt="Tiger" />
            <span>LECI</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Gambar quokka di kanan bawah -->
  <img src="Images/quokka.png" alt="Quokka" class="quokka-fixed" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script>
  $(document).ready(function(){
    var data=JSON.parse(localStorage.getItem("User")); //data login
    document.getElementById("photo_url").src = data.photo_url || "Images/default.jpg";
    document.getElementById("welcome-text").innerHTML = `
            Welcome, <strong></strong>!<br />
            Easily record and monitor wildlif]]]]e activity.<br />
            Access data, report findings, and support conservation efforts in the field.
          `;

  });  

</script>


</body>
</html>
