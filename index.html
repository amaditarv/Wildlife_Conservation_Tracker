<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login Page</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body, html {
      height: 100%;
      font-family: Plus Jakarta Sans, sans-serif;
    }
    .container {
      display: flex;
      height: 100vh;
    }
    .left-rectangle {
      position: relative;
      width: 90%;
      background: linear-gradient(135deg, #71F3FF, #1FDAAE);
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .left-rectangle::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url('images/tiger.png');
      background-repeat: no-repeat;
      background-position: 50% -80%; /* sesuaikan posisi vertikal */
      background-size: 70%;
      opacity: 50%;
      z-index: 0;
    }

  .left-rectangle > * {
    position: relative;
    z-index: 1;
  }

    .right-login {
      width: 35%;
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      height: 100vh;
    }
    .login-header {
      text-align: center;
      margin-bottom: 40px;
      width: 100%;
    }
    .right-login h1 {
      font-size: 80px;
      color: #1FDAAE;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 8px;
      margin-top: 40px;
    }
    .right-login h2 {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin: 0;
    }
    .login-form {
      margin-top: auto;
      margin-bottom: auto;
      width: 100%;
      max-width: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .login-form input {
      width: 80%;
      padding: 12px 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 23px;
      font-size: 14px;
    }
    .login-form input:focus {
      border-color: #4C86C6;
      outline: none;
    }
    .login-form button {
      padding: 12px 25px;
      font-size: 14px;
      border-radius: 10px;
      border: none;
      background-color: #1FDAAE;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      width: fit-content;
      align-self: center;
      margin-top: 10px;
    }
    .login-form button:hover {
      background-color: #17b895;
    }
    .bold-text {
      font-weight: 1500;
}

  </style>
</head>
<body>
  <div class="container">
    <div class="left-rectangle">
      <!-- Optional image or illustration here -->
    </div>
    <div class="right-login">
      <div class="login-header">
        <h1><span class="bold-text">WCT</span><br><span class="bold-text">PAWL</span></h1>
        <h2>Eyes on Wildlife</h2>
      </div>
      <form class="login-form" id="loginForm">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="pass" placeholder="Password" required />
        <button type="submit" id="loginBtn">Login</button>
        <p id="loginSuccess" style="color: green; display: none;"></p>
        <p id="loginFailed" style="color: red; display: none;"></p>
      </form>
    </div>
  <!-- Tambahkan jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

      <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
    
      const email = document.getElementById("email").value;
      const pass = document.getElementById("pass").value;
    
      // Dummy login (bisa kamu ubah)
      if (email === "admin@gmail.com" && pass === "123") {
        document.getElementById("loginFailed").style.display = "none";
        const success = document.getElementById("loginSuccess");
        success.innerText = "Login berhasil!";
        success.style.display = "block";
    
        setTimeout(function () {
          window.location.href = "index.html"; // pastikan ini sesuai
        }, 1500);
    
      } else {
        document.getElementById("loginSuccess").style.display = "none";
        const fail = document.getElementById("loginFailed");
        fail.innerText = "Email atau password salah";
        fail.style.display = "block";
      }
    });
    </script>
</body>
</html>
